<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Bảo Hành - SUNBII</title>
    <meta name="description" content="Tra cứu thông tin bảo hành pin & phụ tùng xe điện tại SUNBII.">
    <meta name="author" content="Đàm Văn Bằng">
    <link rel="icon" href="favicon.ico">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .log-history { list-style: none; padding: 0; margin-top: 10px; }
        .log-history li {
            background-color: var(--bg-card); padding: 10px 15px;
            border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem;
            border: 1px solid var(--border-color); color: var(--text-muted);
        }
        .log-history li strong { color: var(--text-main); }
        .hidden-logs { display: none; margin-top: 8px; padding: 0; list-style: none;}

        .toggle-logs-btn {
            background-color: transparent; border: 1px solid var(--border-color);
            color: var(--accent-blue); padding: 8px 15px; border-radius: 6px;
            cursor: pointer; margin-top: 5px; font-size: 0.85rem;
            font-family: 'Avo', sans-serif; transition: 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .toggle-logs-btn:hover {
            background-color: rgba(59, 130, 246, 0.1); border-color: var(--accent-blue);
        }

        .result-item {
            background-color: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; margin-top: 25px; text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .result-details { margin: 0; padding: 0; }
        .result-section-title {
            font-size: 1rem; color: var(--text-main); margin: 15px 0 8px 0;
            padding-bottom: 5px; border-bottom: 1px dashed var(--border-color);
        }
        .result-section-title:first-child { margin-top: 0; }
        .result-section-title i { color: var(--accent-blue); margin-right: 8px; }
        .result-details p { margin: 5px 0; line-height: 1.5; }

        .partner-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff; padding: 4px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: bold; margin-left: 8px;
            vertical-align: middle;
        }
        .partner-section {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(217, 119, 6, 0.05));
            border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 10px;
            padding: 12px 15px; margin-bottom: 10px;
        }
        .partner-section h4 {
            color: #f59e0b; margin: 0 0 8px 0; font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px;
        }
        .partner-section p { margin: 4px 0; font-size: 0.9rem; }

        /* Responsive mobile */
        @media (max-width: 576px) {
            .result-item { padding: 15px; margin-top: 15px; border-radius: 10px; }
            .result-section-title { font-size: 0.9rem; margin: 12px 0 6px 0; }
            .result-details p { font-size: 0.9rem; }
            .partner-section { padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html"><i class="fas fa-shield-halved"></i> SUNBII<span>SERVICES</span></a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Trang Chủ</a></li>
                    <li><a href="chinh-sach.html">Chính Sách</a></li>
                    <li><a href="tra-cuu.html" class="active">Tra Cứu Bảo Hành</a></li>
                    <li><a href="dich-vu.html">Bảng Giá Dịch Vụ</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-button"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <main class="main-content" style="flex: 1; display:flex; flex-direction:column; justify-content:center;">
        <div class="container" style="text-align: center; margin-top: 40px; margin-bottom: 40px;">
            <h1 class="hero-title" style="font-size: 2.5rem;">Tra Cứu <span>Bảo Hành</span></h1>
            <p class="hero-subtitle">Nhập mã phiếu bảo hành hoặc số điện thoại để kiểm tra thời hạn và lịch sử dịch vụ.</p>

            <div class="policy-link-wrapper" style="margin-bottom: 25px;">
                <a href="chinh-sach.html" class="btn btn-highlight"><i class="fas fa-shield-halved"></i> Xem Chính Sách Bảo Hành Pin B1</a>
            </div>

            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Ví dụ: 09xxxx hoặc SBRB26..." required>
                    <button id="searchButton" class="search-button"><i class="fas fa-search"></i> Kiểm tra ngay</button>
                </div>

                <div id="resultContainer" style="margin-top: 10px;">
                </div>

                <div id="errorContainer" style="display: none; color: var(--accent-red); margin-top: 20px; font-weight: bold; text-align: center;">
                    <i class="fas fa-exclamation-triangle"></i> <span id="errorText">Không tìm thấy dữ liệu!</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SUNBII Services. All rights reserved.</p>
            <div class="social-links">
                <a href="https://fb.com/damvanbang2006" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instargram.com/damvanbang2006" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://zalo.me/0345696820" target="_blank"><i class="fas fa-comment-dots"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        const searchButton = document.getElementById('searchButton');
        const searchInput = document.getElementById('searchInput');
        const resultDiv = document.getElementById('resultContainer');
        const errorDiv = document.getElementById('errorContainer');
        const errorText = document.getElementById('errorText');

        const handleSearch = async (method = null) => {
            const keyword = searchInput.value.trim();
            resultDiv.innerHTML = '';
            errorDiv.style.display = 'none';

            if (keyword === '') {
                errorText.innerText = 'Vui lòng nhập thông tin cần tra cứu.';
                errorDiv.style.display = 'block';
                return;
            }

            searchButton.disabled = true;
            searchButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG TÌM...';

            let apiUrl = `https://api.sunbii.vn/api/servicesCheck?type=auto&keyword=${encodeURIComponent(keyword)}`;
            if (method) {
                apiUrl += `&Method=${encodeURIComponent(method)}`;
            }

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();

                if (Array.isArray(data) && data.length > 0) {
                    const resultsHtml = data.map((item, index) => {
                        const parseVNDate = (dateStr) => {
                            if (!dateStr || !dateStr.includes('/')) return null;
                            const [day, month, year] = dateStr.split('/');
                            return new Date(`${year}-${month}-${day}`);
                        };
                        const endDate = parseVNDate(item.endDate);

                        let statusHtml = '<span class="status-badge" style="background-color: #6c757d; color: #fff;">Chưa rõ</span>';
                        if (endDate) {
                            const today = new Date(); today.setHours(0, 0, 0, 0);
                            if (endDate >= today) {
                                statusHtml = '<span class="status-badge status-active">CÒN HẠN</span>';
                            } else {
                                statusHtml = '<span class="status-badge status-expired">HẾT HẠN</span>';
                            }
                        }

                        const isBuyGroup = item.processingError && item.processingError.toUpperCase() === 'NO';
                        const detailHeader = isBuyGroup ? 'Tên sản phẩm:' : 'Lỗi xử lý:';
                        const detailValue = isBuyGroup ? (item.productName || 'Không có') : (item.processingError || 'Không có');
                        const treatmentPlanHtml = isBuyGroup
                            ? ''
                            : `<p><strong>Phương án xử lý:</strong> ${item.treatmentPlan || 'Không có'}</p>`;

                        // Xác định loại bảo hành
                        const isPartner = item.warrantyType === 'partner';
                        const partnerBadge = isPartner
                            ? '<span class="partner-badge"><i class="fas fa-store"></i> ĐỐI TÁC</span>'
                            : '';

                        // Phần thông tin cửa hàng đối tác
                        let partnerSectionHtml = '';
                        if (isPartner && item.partnerName) {
                            partnerSectionHtml = `
                                <div class="partner-section">
                                    <h4><i class="fas fa-store"></i> THÔNG TIN CỬA HÀNG ĐỐI TÁC</h4>
                                    <p><strong>Tên cửa hàng:</strong> ${item.partnerName}</p>
                                    <p><strong>Địa chỉ:</strong> ${item.contact?.address || 'Không có'}</p>
                                    <p><strong>SĐT liên hệ:</strong> ${item.contact?.phone || 'Không có'}</p>
                                </div>
                            `;
                        }

                        let qrHistoryHtml = '';
                        const allLogs = item.log?.QRCheckHistory || [];
                        const filteredLogs = allLogs.filter(log => log.method === 'QRCoder');

                        if (filteredLogs.length > 0) {
                            const visibleLogs = filteredLogs.slice(0, 5);
                            const hiddenLogs = filteredLogs.slice(5);

                            qrHistoryHtml = visibleLogs.map(log => `<li><strong>${log.time}</strong> - Via ${log.method}</li>`).join('');

                            if (hiddenLogs.length > 0) {
                                let hiddenList = hiddenLogs.map(log => `<li><strong>${log.time}</strong> - Via ${log.method}</li>`).join('');
                                qrHistoryHtml += `<ul class="hidden-logs" id="hidden-logs-${index}">${hiddenList}</ul>`;
                                qrHistoryHtml += `<button class="toggle-logs-btn" data-target="hidden-logs-${index}" data-state="collapsed">
                                                    <i class="fas fa-caret-down"></i> Mở rộng (${hiddenLogs.length})
                                                  </button>`;
                            }
                        } else {
                             qrHistoryHtml = '<li>Chưa có dữ liệu quét tem QR.</li>';
                        }

                        return `
                            <div class="result-item">
                                <div class="result-header">
                                    <h4>Phiếu: <span class="service-code">${item.serviceCode || 'N/A'}</span>${partnerBadge}</h4>
                                    ${statusHtml}
                                </div>

                                <div class="result-details">
                                    ${partnerSectionHtml}

                                    <h3 class="result-section-title"><i class="fas fa-user-check"></i> Thông Tin Khách Hàng</h3>
                                    <p><strong>Khách hàng:</strong> ${item.Name || 'Không có'}</p>
                                    <p><strong>Số điện thoại:</strong> ${item.contact?.phone || 'Không có'}</p>

                                    <h3 class="result-section-title"><i class="fas fa-wrench"></i> Chi Tiết Dịch Vụ</h3>
                                    <p><strong>${detailHeader}</strong> ${detailValue}</p>
                                    ${treatmentPlanHtml}
                                    <p><strong>Ghi chú nội bộ:</strong> ${item.note || 'Không có'}</p>

                                    <h3 class="result-section-title"><i class="fas fa-calendar-check"></i> Lịch Trình Bảo Hành</h3>
                                    <p><strong>Ngày kích hoạt:</strong> <span style="color:var(--accent-green)">${item.date ? item.date.split('-').reverse().join('/') : 'N/A'}</span></p>
                                    <p><strong>Ngày hết hạn:</strong> <span style="color:var(--accent-red)">${item.endDate || 'N/A'}</span></p>
                                    <p><strong>Gói thời gian:</strong> ${item.duration || 'N/A'} tháng</p>

                                    <h3 class="result-section-title"><i class="fas fa-qrcode"></i> Lịch Sử Quét Tem QR</h3>
                                    <ul class="log-history">${qrHistoryHtml}</ul>
                                </div>
                            </div>
                        `;
                    }).join('');

                    resultDiv.innerHTML = resultsHtml;
                    addToggleListeners();

                } else {
                    errorText.innerText = 'Không tìm thấy thông tin bảo hành cho mã/SĐT bạn đã nhập.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorText.innerText = `Có lỗi khi kết nối máy chủ (Lỗi: ${error.message}).`;
                errorDiv.style.display = 'block';
            } finally {
                searchButton.disabled = false;
                searchButton.innerHTML = '<i class="fas fa-search"></i> Kiểm tra ngay';
            }
        };

        function addToggleListeners() {
            const resultDiv = document.getElementById('resultContainer');
            resultDiv.removeEventListener('click', handleToggleClick);
            resultDiv.addEventListener('click', handleToggleClick);
        }

        const handleToggleClick = function(event) {
            const button = event.target.closest('.toggle-logs-btn');
            if (button) {
                const targetId = button.getAttribute('data-target');
                const hiddenLogs = document.getElementById(targetId);
                const currentState = button.getAttribute('data-state');

                if (hiddenLogs) {
                    if (currentState === 'collapsed') {
                        hiddenLogs.style.display = 'block';
                        button.setAttribute('data-state', 'expanded');
                        button.innerHTML = '<i class="fas fa-caret-up"></i> Thu gọn';
                    } else {
                        hiddenLogs.style.display = 'none';
                        button.setAttribute('data-state', 'collapsed');
                        const hiddenCount = hiddenLogs.children.length;
                        button.innerHTML = `<i class="fas fa-caret-down"></i> Mở rộng (${hiddenCount})`;
                    }
                }
            }
        };

        searchButton.addEventListener('click', () => handleSearch());
        searchInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') handleSearch();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const keywordFromUrl = params.get('keyword');
            let methodFromUrl = params.get('method');
            if(methodFromUrl != 'QRCoder'){
                methodFromUrl = params.get('Method');
            }
            if (keywordFromUrl && methodFromUrl === 'QRCoder') {
                searchInput.value = keywordFromUrl;
                handleSearch(methodFromUrl);
            }
        });
    </script>
</body>
</html>
